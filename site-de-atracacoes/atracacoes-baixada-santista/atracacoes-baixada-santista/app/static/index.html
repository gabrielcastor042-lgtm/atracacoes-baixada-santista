<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atracações - Porto de Santos</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #1a2233;
    --muted: #64748b;
    --border: #e2e8f0;
    --accent: #0f766e;
    --accent-hover: #0d6560;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 24px 20px 8px;
    max-width: 1600px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 4px;
  }
  header p {
    color: var(--muted);
    margin: 0;
    font-size: 14px;
  }
  .sync-status-line {
    margin-top: 6px;
    font-size: 12px;
  }
  .toolbar {
    max-width: 1600px;
    margin: 16px auto 0;
    padding: 0 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  input[type="text"], select {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: var(--card);
    color: var(--text);
  }
  input[type="text"] {
    flex: 1 1 240px;
    min-width: 180px;
  }
  button {
    padding: 9px 16px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { background: var(--accent-hover); }
  button.secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  button:disabled { opacity: 0.6; cursor: default; }
  main {
    max-width: 1600px;
    margin: 16px auto 40px;
    padding: 0 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .status-line {
    padding: 10px 16px;
    font-size: 13px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  #table-wrap {
    overflow-x: auto;
  }
 table {
    width: 100%;
    min-width: 1550px;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  thead th {
    text-align: left;
    padding: 7px 8px;
    background: #f8fafc;
    color: var(--muted);
    font-weight: 600;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  .terminal-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    background: #ecfdf5;
    color: var(--accent);
  }
  .empty, .loading, .error {
    padding: 40px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  .error { color: #b91c1c; }
  .upload-row {
    margin-top: 4px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }
  .upload-label {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }
  .upload-status {
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>
<header>
  <h1>Atracações - Porto de Santos</h1>
  <p>Consulta unificada de navios previstos/atracados nos terminais de Santos.</p>
  <p id="sync-status-line" class="sync-status-line">Carregando última sincronização...</p>
</header>

<div class="toolbar">
  <input type="text" id="q" placeholder="Buscar por navio ou viagem...">
  <select id="terminal">
    <option value="">Todos os terminais</option>
    <option value="ecoporto">Ecoporto Santos</option>
    <option value="santos_brasil">Santos Brasil Tecon</option>
    <option value="dp_world">DP World (Embraport)</option>
    <option value="btp">BTP</option>
  </select>
  <button id="btn-buscar">Buscar</button>
  <button id="btn-sync" class="secondary">Sincronizar agora</button>
  <button id="btn-exportar" class="secondary">Exportar Excel</button>
</div>

<div class="toolbar upload-row">
  <span class="upload-label">Santos Brasil (planilha manual):</span>
  <input type="file" id="upload-file" accept=".xls,.xlsx,.html,.htm">
  <button id="btn-upload" class="secondary">Enviar planilha</button>
  <span id="upload-status" class="upload-status"></span>
</div>

<main>
  <div class="card">
    <div class="status-line" id="status-line">Carregando...</div>
    <div id="table-wrap"></div>
  </div>
</main>

<script>
const API_BASE = "";

const els = {
  q: document.getElementById("q"),
  terminal: document.getElementById("terminal"),
  btnBuscar: document.getElementById("btn-buscar"),
  btnSync: document.getElementById("btn-sync"),
  btnExportar: document.getElementById("btn-exportar"),
  statusLine: document.getElementById("status-line"),
  syncStatusLine: document.getElementById("sync-status-line"),
  tableWrap: document.getElementById("table-wrap"),
  uploadFile: document.getElementById("upload-file"),
  btnUpload: document.getElementById("btn-upload"),
  uploadStatus: document.getElementById("upload-status"),
};

const TERMINAL_LABELS = {
  ecoporto: "Ecoporto Santos",
  santos_brasil: "Santos Brasil Tecon",
  dp_world: "DP World",
  btp: "BTP",
};

function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "—";
  const pad = (n) => String(n).padStart(2, "0");
  return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()} - ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function renderRows(rows) {
  if (!rows.length) {
    els.tableWrap.innerHTML = '<div class="empty">Nenhum resultado encontrado.</div>';
    return;
  }

  const cols = [
    ["navio", "Navio"],
    ["viagem", "Viagem"],
    ["terminal", "Terminal"],
    ["eta", "ETA"],
    ["etb", "ETB"],
    ["etd", "ETD"],
    ["ata", "ATA"],
    ["atb", "ATB"],
    ["atd", "ATD"],
    ["deadline_carga", "Deadline carga"],
    ["previsao_abertura_gate", "Previsão gate"],
    ["abertura_gate", "Abertura gate"],
  ];

  const dateFields = new Set(["eta", "etb", "etd", "ata", "atb", "atd", "deadline_carga", "previsao_abertura_gate", "abertura_gate"]);

  const thead = `<thead><tr>${cols.map(([, label]) => `<th>${label}</th>`).join("")}</tr></thead>`;
  const tbody = `<tbody>${rows.map((row) => {
    const cells = cols.map(([key]) => {
      if (key === "terminal") {
        const label = TERMINAL_LABELS[row.terminal] || row.terminal;
        return `<td><span class="terminal-badge">${label}</span></td>`;
      }
      // Se não tem abertura de gate efetiva, usa a previsão como referência.
      const value = key === "abertura_gate" ? (row.abertura_gate || row.previsao_abertura_gate) : row[key];
      const display = dateFields.has(key) ? formatDate(value) : (value || "—");
      return `<td>${display}</td>`;
    }).join("");
    return `<tr>${cells}</tr>`;
  }).join("")}</tbody>`;

  els.tableWrap.innerHTML = `<table>${thead}${tbody}</table>`;
}

async function buscar() {
  els.statusLine.textContent = "Carregando...";
  els.tableWrap.innerHTML = "";

  const params = new URLSearchParams();
  if (els.q.value.trim()) params.set("q", els.q.value.trim());
  if (els.terminal.value) params.set("terminal", els.terminal.value);

  try {
    const resp = await fetch(`${API_BASE}/buscar?${params.toString()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const rows = await resp.json();
    els.statusLine.textContent = `${rows.length} registro(s) encontrado(s).`;
    renderRows(rows);
  } catch (err) {
    els.statusLine.textContent = "Erro ao consultar a API.";
    els.tableWrap.innerHTML = `<div class="error">${err.message}</div>`;
  }
}

async function carregarStatusSync() {
  try {
    const resp = await fetch(`${API_BASE}/status`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const statuses = await resp.json();
    if (!statuses.length) {
      els.syncStatusLine.textContent = "Nenhuma sincronização registrada ainda.";
      return;
    }
    const partes = statuses.map((s) => {
      const label = TERMINAL_LABELS[s.terminal] || s.terminal;
      const fonte = s.terminal === "santos_brasil" ? `${label} (upload manual)` : label;
      const info = s.erro ? `erro (${formatDate(s.atualizado_em)})` : `${formatDate(s.atualizado_em)} · ${s.registros} navio(s)`;
      return `${fonte}: ${info}`;
    });
    els.syncStatusLine.textContent = `Última atualização — ${partes.join("  |  ")}`;
  } catch (err) {
    els.syncStatusLine.textContent = "Não foi possível carregar o status de sincronização.";
  }
}

async function sincronizar() {
  els.btnSync.disabled = true;
  els.btnSync.textContent = "Sincronizando...";
  try {
    const resp = await fetch(`${API_BASE}/sync`, { method: "POST" });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    await resp.json();
    await buscar();
    await carregarStatusSync();
  } catch (err) {
    els.statusLine.textContent = "Erro ao sincronizar.";
  } finally {
    els.btnSync.disabled = false;
    els.btnSync.textContent = "Sincronizar agora";
  }
}

async function enviarPlanilha() {
  const file = els.uploadFile.files[0];
  if (!file) {
    els.uploadStatus.textContent = "Escolha um arquivo primeiro.";
    return;
  }

  els.btnUpload.disabled = true;
  els.btnUpload.textContent = "Enviando...";
  els.uploadStatus.textContent = "";

  const formData = new FormData();
  formData.append("file", file);

  try {
    const resp = await fetch(`${API_BASE}/upload/santos_brasil`, {
      method: "POST",
      body: formData,
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
    els.uploadStatus.textContent = `${data.registros} navio(s) atualizado(s).`;
    els.uploadFile.value = "";
    await buscar();
    await carregarStatusSync();
  } catch (err) {
    els.uploadStatus.textContent = `Erro: ${err.message}`;
  } finally {
    els.btnUpload.disabled = false;
    els.btnUpload.textContent = "Enviar planilha";
  }
}

function exportarExcel() {
  const params = new URLSearchParams();
  if (els.q.value.trim()) params.set("q", els.q.value.trim());
  if (els.terminal.value) params.set("terminal", els.terminal.value);
  window.location.href = `${API_BASE}/exportar?${params.toString()}`;
}

els.btnBuscar.addEventListener("click", buscar);
els.btnSync.addEventListener("click", sincronizar);
els.btnExportar.addEventListener("click", exportarExcel);
els.q.addEventListener("keydown", (e) => { if (e.key === "Enter") buscar(); });
els.terminal.addEventListener("change", buscar);
els.btnUpload.addEventListener("click", enviarPlanilha);

buscar();
carregarStatusSync();
</script>
</body>
</html>
